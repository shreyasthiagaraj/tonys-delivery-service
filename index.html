<script>
'use strict';
/* ============================================================
   TONY'S DELIVERY SERVICE — voxel edition
   A frantic 3-lane pizza runner. WebGL voxel world (no libs),
   2D canvas HUD overlay. Andiamo!
   ============================================================ */

// ---------- tiny helpers ----------
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
function rr(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function hash(n) {
  n = (n * 374761393 + 668265263) | 0;

}
// Every hex in this file is authored in sRGB. The renderer works in LINEAR light:
// colors are decoded on the way in, and re-encoded once at the end of the post chain.
// Lighting sRGB values directly (the old behaviour) is what made everything pastel.
const s2l = c => c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
function col3(hex) { // -> LINEAR rgb, for the GPU
  const n = parseInt(hex.slice(1), 16);
  return [s2l(((n >> 16) & 255) / 255), s2l(((n >> 8) & 255) / 255), s2l((n & 255) / 255)];
}
function srgb3(hex) { // -> raw sRGB rgb, for the 2D canvas HUD
  const n = parseInt(hex.slice(1), 16);
  return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
}
function shade(hex, f) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  if (f < 0) { r *= 1 + f; g *= 1 + f; b *= 1 + f; }
  else { r += (255 - r) * f; g += (255 - g) * f; b += (255 - b) * f; }
  return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')';
}
function shadeHex(hex, f) { // same, but hex out — voxel colors need '#rrggbb'
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  if (f < 0) { r *= 1 + f; g *= 1 + f; b *= 1 + f; }
  else { r += (255 - r) * f; g += (255 - g) * f; b += (255 - b) * f; }
  const h = v => clamp(v | 0, 0, 255).toString(16).padStart(2, '0');
  return '#' + h(r) + h(g) + h(b);
}

// ---------- palette ----------
const INK = '#221A20';
const CREAM = '#FFF6E3';
const RED = '#E63946';
const GREEN = '#2A9D5C';
const GOLD = '#FFC93F';
const CRUST = '#C9803A';
const FONT = "'Arial Rounded MT Bold','Hiragino Maru Gothic ProN','Nunito','Trebuchet MS','Segoe UI',system-ui,sans-serif";
// world palette (voxel look) + time-of-day moods
// Light values are LINEAR and HDR: the sun is allowed past 1.0, the ambient is the cool
// sky bounce that fills the shadow side. Fog is measured on the ground plane, so these
// distances are how far DOWN THE ROAD the haze starts — not how far from the camera's eye.
const L_GOLD = [1.0, 0.62, 0.16], L_RED = [1.0, 0.09, 0.04], L_BLUE = [0.14, 0.28, 1.0];
const L_LAMP = [1.0, 0.78, 0.42], L_FIRE = [1.0, 0.40, 0.09];
// two levels per mood, then it rolls over: day -> sunset -> night
const todIdx = lvl => Math.floor((Math.max(1, lvl) - 1) / 2) % 3;
const TIMES = [ // day / sunset / night
  { sky: '#CBDAE4', fogN: 38, fogF: 82, amb: [0.34, 0.38, 0.45], light: [1.02, 0.97, 0.87], sun: [0.551, 0.702, -0.451], pt: 0.45, lamp: false, wet: 0, hero: 0.10 },
  { sky: '#E9B896', fogN: 36, fogF: 78, amb: [0.30, 0.26, 0.30], light: [1.20, 0.78, 0.48], sun: [0.72, 0.36, -0.59], pt: 0.62, lamp: true, wet: 0.45, hero: 0.55 },
  { sky: '#1E2749', fogN: 34, fogF: 74, amb: [0.08, 0.10, 0.18], light: [0.20, 0.24, 0.42], sun: [0.40, 0.80, -0.44], pt: 1.05, lamp: true, wet: 0.9, hero: 1.15 },
];

// ---------- save ----------
const DEFS = { bs: 0, lvl: 1, best: {}, skins: ['classico'], skin: 'classico', sound: true, delivered: 0 };
let S = Object.assign({}, DEFS);
try { S = Object.assign({}, DEFS, JSON.parse(localStorage.getItem('tonys_v1') || '{}')); } catch (e) {}
function save() { try { localStorage.setItem('tonys_v1', JSON.stringify(S)); } catch (e) {} }

// ---------- skins ----------
const SKINS = [
  { id: 'classico', name: 'Classico', cost: 0,    body: '#E63946', trim: '#9D2230', rider: '#2B6E4F', helmet: '#F4F0E4' },
  { id: 'verde',    name: 'Verde Basilico', cost: 150, body: '#2A9D5C', trim: '#1D7040', rider: '#8A3033', helmet: '#F4F0E4' },
  { id: 'notte',    name: 'Blu Notte', cost: 300,  body: '#3D5A99', trim: '#273C69', rider: '#33343E', helmet: '#F2C14E' },
  { id: 'taxi',     name: 'Giallo Taxi', cost: 450, body: '#F2B722', trim: '#B8860B', rider: '#33343E', helmet: '#26262B' },
  { id: 'gelato',   name: 'Rosa Gelato', cost: 650, body: '#F27E9B', trim: '#C2506F', rider: '#7BC9C2', helmet: '#F6F2E9' },
  { id: 'oro',      name: "Don d'Oro", cost: 1000, body: '#D4AF37', trim: '#8A6D1D', rider: '#26262B', helmet: '#D4AF37' },
];
const curSkin = () => SKINS.find(s => s.id === S.skin) || SKINS[0];

// ---------- canvases ----------
const glc = document.getElementById('gl');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 420, H = 840, scale = 1, dpr = 1, cx = 210, topSafe = 0;
const LANEW = 106, M2PX = 8, PXU = 48; // 48 track px = 1 world unit
const laneX = i => (i - 1) * LANEW;    // track space, centered on road
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / 420, wh / 700);
  W = ww / scale; H = wh / scale;
  canvas.width = Math.round(ww * dpr);
  canvas.height = Math.round(wh * dpr);
  glc.width = Math.round(ww * dpr);
  glc.height = Math.round(wh * dpr);
  canvas.style.width = glc.style.width = ww + 'px';
  canvas.style.height = glc.style.height = wh + 'px';
  cx = W / 2;
  if (gl) gl.viewport(0, 0, glc.width, glc.height);
  if (typeof sizePost === 'function' && post) sizePost();
  try {
    topSafe = (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sat')) || 0) / scale;
  } catch (e) { topSafe = 0; }
}

// ---------- mat4 (column-major) ----------
function mMul(a, b) {
  const o = new Float32Array(16);
  for (let c = 0; c < 4; c++) for (let r = 0; r < 4; r++) {
    o[c * 4 + r] = a[r] * b[c * 4] + a[4 + r] * b[c * 4 + 1] + a[8 + r] * b[c * 4 + 2] + a[12 + r] * b[c * 4 + 3];
  }
  return o;
}
function mPersp(fovY, aspect, near, far) {
  const f = 1 / Math.tan(fovY / 2), nf = 1 / (near - far);
  const o = new Float32Array(16);
  o[0] = f / aspect; o[5] = f;
  o[10] = (far + near) * nf; o[11] = -1;
  o[14] = 2 * far * near * nf;
  return o;
}
function mLookAt(eye, c2, up) {
  let fx = c2[0] - eye[0], fy = c2[1] - eye[1], fz = c2[2] - eye[2];
  let l = Math.hypot(fx, fy, fz) || 1; fx /= l; fy /= l; fz /= l;
  let sx = fy * up[2] - fz * up[1], sy = fz * up[0] - fx * up[2], sz = fx * up[1] - fy * up[0];
  l = Math.hypot(sx, sy, sz) || 1; sx /= l; sy /= l; sz /= l;
  const ux = sy * fz - sz * fy, uy = sz * fx - sx * fz, uz = sx * fy - sy * fx;
  return new Float32Array([
    sx, ux, -fx, 0,
    sy, uy, -fy, 0,
    sz, uz, -fz, 0,
    -(sx * eye[0] + sy * eye[1] + sz * eye[2]),
    -(ux * eye[0] + uy * eye[1] + uz * eye[2]),
    fx * eye[0] + fy * eye[1] + fz * eye[2], 1,
  ]);
}
function mCompose(tx, ty, tz, ry, rx, rz, s) {
  // T * Ry * Rx * Rz * scale (uniform number or [sx,sy,sz]), expanded
  ry = ry || 0; rx = rx || 0; rz = rz || 0;
  let s0 = 1, s1 = 1, s2 = 1;
  if (Array.isArray(s)) { s0 = s[0]; s1 = s[1]; s2 = s[2]; }
  else if (s !== undefined) { s0 = s1 = s2 = s; }
  const cy = Math.cos(ry), sy = Math.sin(ry);
  const ca = Math.cos(rx), sa = Math.sin(rx);
  const cz = Math.cos(rz), sz = Math.sin(rz);
  const r00 = cy * cz + sy * sa * sz, r01 = -cy * sz + sy * sa * cz, r02 = sy * ca;
  const r10 = ca * sz, r11 = ca * cz, r12 = -sa;
  const r20 = -sy * cz + cy * sa * sz, r21 = sy * sz + cy * sa * cz, r22 = cy * ca;
  return new Float32Array([
    r00 * s0, r10 * s0, r20 * s0, 0,
    r01 * s1, r11 * s1, r21 * s1, 0,
    r02 * s2, r12 * s2, r22 * s2, 0,
    tx, ty, tz, 1,
  ]);
}
let lastVP = mCompose(0, 0, 0, 0, 0, 0, 1);
function project(x, y, z) { // world -> overlay logical px, null if behind camera
  const m = lastVP;
  const w = m[3] * x + m[7] * y + m[11] * z + m[15];
  if (w <= 0.01) return null;
  const px = (m[0] * x + m[4] * y + m[8] * z + m[12]) / w;
  const py = (m[1] * x + m[5] * y + m[9] * z + m[13]) / w;
  return { x: (px * 0.5 + 0.5) * W, y: (0.5 - py * 0.5) * H };

// ---------- WebGL core ----------
// WebGL2 where available (real MSAA + float render targets); WebGL1 is a degraded fallback.
let gl = null, prog = null, loc = {}, isGL2 = false, hdrOK = false, HALF = 0, SAMPLES = 0;
// fragment shaders: highp where the device has it, mediump otherwise
const FSP = '#ifdef GL_FRAGMENT_PRECISION_HIGH\nprecision highp float;\n#else\nprecision mediump float;\n#endif\n';
const VSTRIDE = 40; // pos3 + norm3 + col3 + emis1, interleaved
// Forward point lights. The world is a narrow corridor and the camera only ever sees a
// slab of it, so the N nearest lights to the player are the only ones that can matter —
// clustering would be machinery for a problem this scene doesn't have.
const NLIGHT = 8;
const lightP = new Float32Array(NLIGHT * 4); // xyz = position, w = radius
const lightC = new Float32Array(NLIGHT * 3); // linear HDR colour
let lightN = 0;
const lightPool = [];
function addLight(x, y, z, r, col, i) {
  lightPool.push({ x, y, z, r, col, i });
}
function uploadLights(px, pz) {
  // nearest-first, because a light you can't see doesn't get to occupy one of the 8 slots
  lightPool.sort((a, b) => ((a.x - px) ** 2 + (a.z - pz) ** 2) - ((b.x - px) ** 2 + (b.z - pz) ** 2));
  lightN = Math.min(NLIGHT, lightPool.length);
  for (let k = 0; k < lightN; k++) {
    const L = lightPool[k];
    lightP[k * 4] = L.x; lightP[k * 4 + 1] = L.y; lightP[k * 4 + 2] = L.z; lightP[k * 4 + 3] = L.r;
    lightC[k * 3] = L.col[0] * L.i; lightC[k * 3 + 1] = L.col[1] * L.i; lightC[k * 3 + 2] = L.col[2] * L.i;
  }
  gl.uniform4fv(loc.uLP, lightP);
  gl.uniform3fv(loc.uLC, lightC);
  gl.uniform1f(loc.uLN, lightN);
  lightPool.length = 0;
}
function compile(type, src) {
  const s2 = gl.createShader(type);
  gl.shaderSource(s2, src);
  gl.compileShader(s2);
  if (!gl.getShaderParameter(s2, gl.COMPILE_STATUS)) {
    // a silent shader failure used to mean a black screen and no clue why
    console.error('shader compile failed:\n' + gl.getShaderInfoLog(s2) + '\n---\n' + src);
    return null;
  }
  return s2;
}
function link(vsSrc, fsSrc) {
  const p = gl.createProgram();
  const v = compile(gl.VERTEX_SHADER, vsSrc), f = compile(gl.FRAGMENT_SHADER, fsSrc);
  if (!v || !f) return null;
  gl.attachShader(p, v);
  gl.attachShader(p, f);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('program link failed: ' + gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}
function initGL() {
  try {
    gl = glc.getContext('webgl2', { antialias: false, alpha: false, depth: true });
    if (gl) isGL2 = true;
    else gl = glc.getContext('webgl', { antialias: true, alpha: false }) || glc.getContext('experimental-webgl');
  } catch (e) { gl = null; }
  if (!gl) return;
  if (isGL2) {
    // RGBA16F needs to be color-renderable for the HDR scene target
    hdrOK = !!(gl.getExtension('EXT_color_buffer_float') || gl.getExtension('EXT_color_buffer_half_float'));
    HALF = gl.HALF_FLOAT;
    SAMPLES = Math.min(4, gl.getParameter(gl.MAX_SAMPLES) || 0);
  } else {
    const hf = gl.getExtension('OES_texture_half_float');
    const hfl = gl.getExtension('OES_texture_half_float_linear');
    const cb = gl.getExtension('EXT_color_buffer_half_float');
    hdrOK = !!(hf && hfl && cb);
    if (hf) HALF = hf.HALF_FLOAT_OES;
  }
  // Lighting is PER-PIXEL. It used to be per-vertex, which on boxes this large meant a
  // whole face got one lighting value — no gradient, no shadow detail, nothing to sculpt
  // with. The vertex stage now just hands the fragment stage a surface to light.
  const vs =
    'attribute vec3 aPos;attribute vec3 aNorm;attribute vec3 aCol;attribute float aEmis;' +
    'uniform mat4 uMVP;uniform mat4 uModel;uniform vec3 uTint;uniform float uEmis;' +
    'varying vec3 vBase;varying vec3 vNorm;varying vec3 vWP;varying float vE;' +
    'void main(){' +
    'vec4 wp=uModel*vec4(aPos,1.0);' +
    'gl_Position=uMVP*vec4(aPos,1.0);' +
    'vWP=wp.xyz;' +
    'vNorm=mat3(uModel)*aNorm;' +
    'vBase=aCol*uTint;' +
    'vE=aEmis*uEmis;}';
  const fs = FSP +
    'varying vec3 vBase;varying vec3 vNorm;varying vec3 vWP;varying float vE;' +
    'uniform vec3 uLightDir;uniform vec3 uLightCol;uniform vec3 uAmbCol;' +
    'uniform vec3 uEye;uniform vec2 uFog;uniform vec3 uFogCol;uniform float uSpec;' +
    'uniform mat4 uLightVP;uniform sampler2D uShadow;uniform vec2 uSM;uniform float uWet;' +
    'uniform vec4 uLP[' + NLIGHT + '];uniform vec3 uLC[' + NLIGHT + '];uniform float uLN;' +
    'float shade(float ndl){' +
    'if(uSM.y<0.5)return 1.0;' +
    'vec4 ls=uLightVP*vec4(vWP,1.0);' +
    'vec3 p=ls.xyz/ls.w*0.5+0.5;' +
    'if(p.z>1.0||p.x<0.0||p.x>1.0||p.y<0.0||p.y>1.0)return 1.0;' +
    // slope-scaled bias: grazing surfaces need more room before they shadow themselves
    'float b=max(0.0032*(1.0-ndl),0.0006);' +
    'float s=0.0;' +
    'for(int i=-1;i<=1;i++){for(int j=-1;j<=1;j++){' +
    'float d=texture2D(uShadow,p.xy+vec2(float(i),float(j))*uSM.x).r;' +
    's+=step(p.z-b,d);}}' +
    'return s*0.1111;}' +
    // Value noise, sampled on the world plane. Big flat slabs of one colour read as plastic
    // no matter how good the palette is; this is the grain that makes asphalt asphalt.
    'float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}' +
    'float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);' +
    'return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);}' +
    'void main(){' +
    'vec3 n=normalize(vNorm);' +
    'float d=max(dot(n,uLightDir),0.0);' +
    'float sh=shade(d);' +
    // grain only on up-facing surfaces (roads, pavement, ground) — walls stay clean
    'float up=max(n.y,0.0);' +
    'float g=(vnoise(vWP.xz*3.1)*0.6+vnoise(vWP.xz*11.0)*0.4-0.5)*0.13*up;' +
    // WET STREET. Puddled asphalt is darker and far glossier, so it stops scattering light
    // and starts MIRRORING it. Under this camera that is the whole reflection: every lamp
    // and taillight smears down the road as a hard specular streak.
    'float wetn=vnoise(vWP.xz*0.55);' +
    'float wet=uWet*up*smoothstep(0.30,0.75,wetn);' +
    'vec3 base=vBase*(1.0+g)*mix(1.0,0.55,wet);' +
    'float gloss=mix(28.0,220.0,wet);' +
    'float sp=uSpec+wet*0.85;' +
    'vec3 lit=base*(uAmbCol+uLightCol*d*sh);' +
    'vec3 V=normalize(uEye-vWP);' +
    'vec3 Hv=normalize(uLightDir+V);' +
    'lit+=uLightCol*sp*pow(max(dot(n,Hv),0.0),gloss)*step(0.0001,d)*sh;' +
    // a wet surface also mirrors the sky, strongest at grazing angles
    'float fres=pow(1.0-clamp(dot(n,V),0.0,1.0),4.0);' +
    'lit+=uFogCol*wet*fres*0.28;' +
    // POINT LIGHTS. Every breadstick, taillight, lamp and blinker is a real light that
    // spills onto the road and the geometry around it. Before, they were additive
    // billboards pasted over the frame — light ON the screen, not light IN the world.
    'for(int i=0;i<' + NLIGHT + ';i++){' +
    'if(float(i)>=uLN)break;' +
    'vec3 dv=uLP[i].xyz-vWP;' +
    'float q=dot(dv,dv);' +
    'float r=uLP[i].w;' +
    'float att=clamp(1.0-q/(r*r),0.0,1.0);att*=att;' +
    'vec3 ld=dv*inversesqrt(max(q,0.0001));' +
    'lit+=base*uLC[i]*(max(dot(n,ld),0.0)*att);' +
    // the glint that becomes a reflection once the road is wet
    'lit+=uLC[i]*sp*pow(max(dot(n,normalize(ld+V)),0.0),gloss*1.6)*att;}' +
    // emission rides on top and is free to exceed 1.0 — that is what feeds the bloom
    'vec3 c=lit+base*vE;' +
    // fog on GROUND-PLANE distance. Measuring from the eye made the camera's altitude
    // count against every pixel, which is what beiged the top third of the frame.
    'float f=clamp((length(vWP.xz-uEye.xz)-uFog.x)/(uFog.y-uFog.x),0.0,1.0);' +
    'gl_FragColor=vec4(mix(c,uFogCol,f),1.0);}';

  if (!prog) { gl = null; return; }
  gl.useProgram(prog);
  for (const n of ['uMVP', 'uModel', 'uLightDir', 'uLightCol', 'uAmbCol', 'uTint', 'uEye', 'uFog', 'uFogCol', 'uEmis', 'uSpec', 'uLightVP', 'uShadow', 'uSM', 'uLP', 'uLC', 'uLN', 'uWet']) loc[n] = gl.getUniformLocation(prog, n);
  loc.aPos = gl.getAttribLocation(prog, 'aPos');
  loc.aNorm = gl.getAttribLocation(prog, 'aNorm');
  loc.aCol = gl.getAttribLocation(prog, 'aCol');
  loc.aEmis = gl.getAttribLocation(prog, 'aEmis');
  gl.uniform1i(loc.uShadow, 3);
  bindSceneAttribs();
  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.CULL_FACE);
  gl.cullFace(gl.BACK);
  initShadow();
}
// ---------- shadow map ----------
// One 2048^2 directional depth map on an ortho frustum that tracks the player. The world
// is a narrow corridor, so the frustum is tiny and the resolution is luxurious.
// This replaces MOD.shadow, which was a flat dark box sitting *under* each object —
// it never read as a cast shadow because it wasn't one.
let sprog = null, sloc = {}, sm = null, lightVP = null, shadowsOK = false, PASS = 0;
const SM_SIZE = 2048;

    for (let k = k0; k < k0 + 31; k++) {
      const segpx = k * SEG_PX + SEG_PX / 2;
      if (nearTurnPx(segpx)) continue;
      for (let side = 0; side < 2; side++) {
        const lamp = plotLamps[Math.floor(hash(k * 2 + side + 7) * MOD.plots.length)];
        if (!lamp) continue;
        const pq = place(segpx, side ? PLOT_X : -PLOT_X);
        const mir = side ? 1 : -1;

    } else if (e.type === 'car') { // glowing taillights
      glow(pp.x - 0.48, 0.55, pp.z + 1.42, 0.5, HOT_RED, 1.5);
      glow(pp.x + 0.48, 0.55, pp.z + 1.42, 0.5, HOT_RED, 1.5);
    } else if (e.type === 'cop') {
      const ph2 = Math.floor(t * 5) % 2;
      glow(pp.x - 0.48, 0.55, pp.z + 1.42, 0.5, HOT_RED, 1.5);
      glow(pp.x + 0.48, 0.55, pp.z + 1.42, 0.5, HOT_RED, 1.5);
      glow(pp.x + (ph2 ? -0.25 : 0.25), 1.55, pp.z + 0.1, 1.4, ph2 ? HOT_RED : HOT_BLUE, 1.7);
      pool(pp.x, pp.z, [3.4, 1, 4.4], ph2 ? HOT_RED : HOT_BLUE, 0.30);
    } else if (e.type === 'barrier') {
      if (Math.floor(t * 3 + e.y * 0.01) % 2) {
        glow(pp.x, 1.32, pp.z, 0.85, GOLDY, 2.0);
        pool(pp.x, pp.z, [2.6, 1, 1.8], GOLDY, 0.24);
      }
    }
  }
  // player lights: boost flame, crash fireball (headlight shelved with night mode)
  if (o.player) {
    if (o.boost && !o.player.crash) {
      const fk = 0.7 + Math.sin(t * 30) * 0.3;
      glow(pp0.x, 0.35, pp0.z + 1.45, 0.9, FIRE, 2.0 * fk);
      pool(pp0.x, pp0.z + 1.5, [1.3, 1, 2.2], FIRE, 0.5 * fk);

    if (o.player.crash) {
      const cf = Math.max(0, 1 - o.player.crash.rx / 5);
      glow(pp0.x, 0.8, pp0.z - o.player.crash.dz, 4.5 * (1 - cf * 0.4), FIRE, 3.4 * cf);
      pool(pp0.x, pp0.z - o.player.crash.dz, [5, 1, 4], FIRE, 0.9 * cf);

  gl.uniform3fv(loc.uAmbCol, tod.amb);
  gl.uniform3fv(loc.uLightCol, tod.light);
  gl.uniform2f(loc.uFog, tod.fogN, tod.fogF);
  gl.disable(gl.BLEND);
  gl.enable(gl.CULL_FACE);
  gl.enable(gl.DEPTH_TEST);
  gl.depthMask(true);

}

  }
  if (r < 0.14) { // breadstick arc weaving across lanes
    const dir = Math.random() < 0.5 ? 1 : -1;
    for (let i = 0; i < 6; i++) {
      const l = clamp(dir > 0 ? Math.floor(i / 2) : 2 - Math.floor(i / 2), 0, 2);
      ent('stick', l, y + i * 56);

    return 340;
  }
  if (r < 0.26) { // breadstick line
    const l = ri(0, 2);

    return 320;

  if (r < 0.42) { // single car (sometimes with a treat behind)
    const l = ri(0, 2);
    ent('car', l, y, { col: pick(CARCOLS) });
    if (Math.random() < 0.4) ent('stick', (l + ri(1, 2)) % 3, y + 60);
    return 0;
  }
  if (r < 0.54) { // roadwork barrier
    ent('barrier', ri(0, 2), y);
    return 0;
  }
  if (r < 0.54 + 0.14 * d + 0.04) { // wall with one gap, treats in the gap
    const gap = ri(0, 2);
    for (let l = 0; l < 3; l++) {
      if (l === gap) continue;
      Math.random() < 0.5 ? ent('car', l, y, { col: pick(CARCOLS) }) : ent('barrier', l, y);
    }
    for (let i = 0; i < 3; i++) ent('stick', gap, y - 20 + i * 46);
    return 140;
  }
  if (r < 0.72 + 0.06 * d) { // slalom
    let l = ri(0, 2);

    ent('trap', 1, y, { busted: 0 });

// ---------- update ----------
function updatePlay(dt) {
  run.elapsed += dt;
  player.inv = Math.max(0, player.inv - dt);

  // the clock
  const timeLeft = run.timeLimit - run.elapsed;

    const sec = Math.ceil(timeLeft);

  }
  if (timeLeft <= 0 && !run.over) {
    run.over = true;
    flashR = 0.6;

  // speed & travel

  }
  // exhaust puffs
  run.puffT += dt;

    run.puffT = 0;

    if (puffs.length > 26) puffs.shift();
  }

  tryLaneMove();

        Math.abs(o2.x - e.x) < 70 && o2.y > e.y && o2.y - e.y < 190);

    uiButton(x + cw / 2 - 110, y + 240, 220, 54, cold ? '+15 SECONDS  🥖 30' : 'REVIVE  🥖 30', revive, { col: '#D98E04', primary: true });
    txt('Tony believes in second chances', x + cw / 2, y + 312, 13, '#6B5B4E', 'center', 700);
  }
  uiButton(x + cw / 2 - 105, by, 210, 56, 'TRY AGAIN', () => startRun(run.lvl), { primary: !canRevive });
  uiButton(x + cw / 2 - 70, y + chh - 52, 140, 40, 'MENU', () => setState('title'), { ghost: true });
}
function drawShop(dt) {
  dim(0.42);
  txt('TONY’S GARAGE', cx, 52, 30, CREAM, 'center', 900, true);
  ctx.save();
  ctx.fillStyle = 'rgba(255,246,227,0.92)';
  ctx.lineWidth = 3; ctx.strokeStyle = INK;
  rr(ctx, cx - 62, 74, 124, 34, 17); ctx.fill(); ctx.stroke();
  txt('🥖 ' + S.bs, cx, 92, 17, '#7A4A12', 'center', 900);
  ctx.restore();
  const cardW = 152, cardH = 158, gapX = 18, gapY = 10;
  const gx = cx - cardW - gapX / 2;
  const gy = 122;
  SKINS.forEach((sk, i) => {
    const col = i % 2, rowI = Math.floor(i / 2);
    let x = gx + col * (cardW + gapX), y = gy + rowI * (cardH + gapY);
    if (shopShake && shopShake.id === sk.id) {
      shopShake.t -= dt;
      if (shopShake.t <= 0) shopShake = null;
      else x += Math.sin(shopShake.t * 50) * 5;
    }
    const owned = S.skins.includes(sk.id);
    const riding = S.skin === sk.id;
    ctx.save();
    ctx.fillStyle = 'rgba(20,12,16,0.3)';
    rr(ctx, x + 3, y + 4, cardW, cardH, 16); ctx.fill();
    ctx.fillStyle = riding ? '#FFF0C9' : CREAM;
    ctx.lineWidth = riding ? 4.5 : 3; ctx.strokeStyle = riding ? '#D98E04' : INK;
    rr(ctx, x, y, cardW, cardH, 16); ctx.fill(); ctx.stroke();
    ctx.save();
    ctx.translate(x + cardW / 2, y + 58);
    ctx.scale(0.94, 0.94);
    drawScooterIcon(ctx, sk, { t: tGlobal });
    ctx.restore();
    txt(sk.name, x + cardW / 2, y + 111, 14, INK, 'center', 900);
    if (riding) txt('RIDING', x + cardW / 2, y + 136, 14, '#D98E04', 'center', 900);
    else if (owned) txt('TAP TO RIDE', x + cardW / 2, y + 136, 13, GREEN, 'center', 900);
    else {
      ctx.fillStyle = S.bs >= sk.cost ? GREEN : '#B0A392';
      rr(ctx, x + cardW / 2 - 46, y + 123, 92, 26, 13); ctx.fill();
      ctx.lineWidth = 2.5; ctx.strokeStyle = INK; ctx.stroke();
      txt('🥖 ' + sk.cost, x + cardW / 2, y + 136, 13.5, CREAM, 'center', 900);
    }
    ctx.restore();
    buttons.push({
      x, y, w: cardW, h: cardH,
      fn: () => {
        if (owned) { S.skin = sk.id; save(); sfx.pick(); }
        else if (S.bs >= sk.cost) { S.bs -= sk.cost; S.skins.push(sk.id); S.skin = sk.id; save(); sfx.cash(); }
        else { shopShake = { id: sk.id, t: 0.4 }; sfx.miss(); }
      },
    });
  });
  uiButton(cx - 80, gy + 3 * (cardH + gapY) + 6, 160, 50, 'BACK', () => setState('title'), { ghost: true, primary: true });
}
function drawPause() {
  dim(0.6);
  txt('PAUSA', cx, H * 0.3, 44, CREAM, 'center', 900, true);
  uiButton(cx - 105, H * 0.42, 210, 58, 'RESUME', () => setState('play'), { primary: true });
  uiButton(cx - 80, H * 0.42 + 76, 160, 46, 'QUIT RUN', () => { S.bs += run.sticks; save(); setState('title'); }, { ghost: true });
  soundToggle(cx, H * 0.42 + 172);
}

// ---------- scene + main loop ----------
function renderScene(t) {
  if (state === 'title' || state === 'order' || state === 'shop' || !run) {
    const wob = Math.sin(tTitle * 1.1) * 28;
    renderWorld({
      traveled: tTitle * 260, px: wob, t, lvl: S.lvl,
      entities: [], turns: [], boost: false,
      player: { xw: wob / PXU, skin: curSkin(), tilt: Math.cos(tTitle * 1.1) * 0.35, blink: false },
    });
  } else {
    let crashPose = null;
    if (run.crashing) {
      const ct = run.crashT;
      crashPose = {
        dz: Math.min(2.6, ct * 2.4),
        y: Math.max(0, 1.9 * Math.sin(Math.min(ct * 2.6, Math.PI))) + 0.05,
        rx: ct * 7.5, ry: ct * 4.2, rz: ct * 5.8,
      };
    }
    renderWorld({
      traveled: run.traveled, px: player.x, t, lvl: run.lvl,
      entities, turns: run.turns, run, corner: run.corner,
      boost: isBoost() && !run.over,
      player: {
        xw: player.x / PXU, skin: curSkin(), tilt: player.tilt,
        blink: player.inv > 0, stumble: player.stumble > 0, arriving: run.arriving,
        crash: crashPose,
      },
    });
  }
}
let last = 0;
function frame(ts) {
  requestAnimationFrame(frame);
  const t = ts / 1000;
  let dt = t - last;
  last = t;
  if (dt <= 0 || dt > 0.25) dt = 0.016;
  dt = Math.min(dt, 0.033);
  // near-miss slow-mo. The cinematic itself decays in REAL time; everything else runs on
  // the dilated clock, so the whole world drags while the effect plays out.
  cine = Math.max(0, cine - dt / 0.55);
  dt *= 1 - 0.42 * cine * cine;
  tGlobal += dt;
  stateT += dt;
  buttons = [];
  if (state === 'play') {
    if (run.crashing) {
      // cinematic tumble: world freezes, scooter cartwheels, then the bad news
      run.crashT += dt;
      updateFx(dt);
      if (Math.random() < 0.4) burst3(player.x + rnd(-30, 30), -run.crashT * 100, 1, '#F7F4EA', { life: 0.5 });
      if (run.crashT > 1.35) gameOver('crash');
    } else updatePlay(dt);
  }
  else {
    updateFx(dt);
    if (state === 'title' || state === 'order' || state === 'shop') tTitle += dt;
  }
  renderScene(tGlobal);
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  if (!gl) {
    ctx.fillStyle = '#221A20';
    ctx.fillRect(0, 0, W, H);
    txt('Mamma mia! This game needs WebGL.', cx, H / 2, 18, CREAM, 'center', 900);
    return;
  }
  if (state === 'play') drawHud(tGlobal);
  else if (state === 'title') drawTitle();
  else if (state === 'order') { if (!pendingOrder) prepOrder(); drawOrder(); }
  else if (state === 'delivered') drawDelivered();
  else if (state === 'dead') drawDead();
  else if (state === 'shop') drawShop(dt);
  else if (state === 'pause') drawPause();
  if (state !== 'title' && state !== 'shop' && bubble && state !== 'play') drawTonyCorner(tGlobal);
  drawFx();
}

// order screen regenerates each visit
const _setState = setState;
setState = function (s) {
  if (s === 'order') prepOrder();
  _setState(s);
};

// ---------- boot ----------
initGL();
initPost();
buildModels();
resize();
requestAnimationFrame(frame);

// ---------- test hooks ----------
window.__T = {
  get state() { return state; },
  setState: s => setState(s),
  startRun,
  onSwipe,
  swipe: onSwipe,
  press: () => { boostTouch = true; },
  release: () => { boostTouch = false; },
  tap: onTap,
  setGod: b => { GOD = !!b; },
  crash: () => { if (run) startCrash(); },
  finish: () => { if (run) run.traveled = run.distM * M2PX + 1; },
  get run() { return run; },
  get player() { return player; },
  get entities() { return entities; },
  get S() { return S; },
  resize,
};
</script>
