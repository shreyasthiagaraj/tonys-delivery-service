<title>Tony's Delivery Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{--sat:env(safe-area-inset-top,0px)}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#221A20;overscroll-behavior:none;-webkit-user-select:none;user-select:none}
  #c{position:fixed;inset:0;display:block;touch-action:none;-webkit-tap-highlight-color:transparent}
</style>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   TONY'S DELIVERY SERVICE — a frantic 3-lane pizza runner
   One-thumb, portrait-first, pure canvas. Andiamo!
   ============================================================ */

// ---------- tiny helpers ----------
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
function rr(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function hash(n) {
  n = (n * 374761393 + 668265263) | 0;
  n = ((n ^ (n >>> 13)) * 1274126177) | 0;
  return ((n ^ (n >>> 16)) >>> 0) / 4294967296;
}
function shade(hex, f) { // f<0 darken, f>0 lighten
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  if (f < 0) { r *= 1 + f; g *= 1 + f; b *= 1 + f; }
  else { r += (255 - r) * f; g += (255 - g) * f; b += (255 - b) * f; }
  return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')';
}

// ---------- palette ----------
const INK = '#221A20';
const CREAM = '#FFF6E3';
const RED = '#E63946';
const GREEN = '#2A9D5C';
const GOLD = '#FFC93F';
const CRUST = '#C9803A';
const ASPHALT = '#3E4350';
const FONT = "'Arial Rounded MT Bold','Hiragino Maru Gothic ProN','Nunito','Trebuchet MS','Segoe UI',system-ui,sans-serif";

// ---------- save ----------
const DEFS = { bs: 0, lvl: 1, best: {}, skins: ['classico'], skin: 'classico', sound: true, delivered: 0 };
let S = Object.assign({}, DEFS);
try { S = Object.assign({}, DEFS, JSON.parse(localStorage.getItem('tonys_v1') || '{}')); } catch (e) {}
function save() { try { localStorage.setItem('tonys_v1', JSON.stringify(S)); } catch (e) {} }

// ---------- skins ----------
const SKINS = [
  { id: 'classico', name: 'Classico', cost: 0,    body: '#E63946', trim: '#9D2230', rider: '#2B6E4F', helmet: '#F4F1EA' },
  { id: 'verde',    name: 'Verde Basilico', cost: 150, body: '#2A9D5C', trim: '#1D7040', rider: '#8A3033', helmet: '#F4F1EA' },
  { id: 'notte',    name: 'Blu Notte', cost: 300,  body: '#3D5A99', trim: '#273C69', rider: '#33343E', helmet: '#F2C14E' },
  { id: 'taxi',     name: 'Giallo Taxi', cost: 450, body: '#F2B722', trim: '#B8860B', rider: '#33343E', helmet: '#26262B' },
  { id: 'gelato',   name: 'Rosa Gelato', cost: 650, body: '#F27E9B', trim: '#C2506F', rider: '#7BC9C2', helmet: '#FFFFFF' },
  { id: 'oro',      name: "Don d'Oro", cost: 1000, body: '#D4AF37', trim: '#8A6D1D', rider: '#26262B', helmet: '#D4AF37' },
];
const curSkin = () => SKINS.find(s => s.id === S.skin) || SKINS[0];

// ---------- canvas ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 420, H = 840, scale = 1, dpr = 1, cx = 210, playerY = 660, topSafe = 0;
const LANEW = 106, ROADW = 336, M2PX = 8;
const laneX = i => cx + (i - 1) * LANEW;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / 420, wh / 700);
  W = ww / scale; H = wh / scale;
  canvas.width = Math.round(ww * dpr);
  canvas.height = Math.round(wh * dpr);
  canvas.style.width = ww + 'px';
  canvas.style.height = wh + 'px';
  cx = W / 2;
  playerY = H - 175;
  try {
    topSafe = (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sat')) || 0) / scale;
  } catch (e) { topSafe = 0; }
}
window.addEventListener('resize', resize);
resize();

// ---------- audio ----------
let actx = null, master = null, musicTimer = null, musicT = 0, musicStep = 0, lastSay = -9999;
function initAudio() {
  if (actx || !(window.AudioContext || window.webkitAudioContext)) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = 0.55;
    master.connect(actx.destination);
    startMusic();
  } catch (e) { actx = null; }
}
function toneAt(f, dur, type, vol, at, slide) {
  if (!actx || !S.sound) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f, at);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f + slide), at + dur);
    g.gain.setValueAtTime(vol, at);
    g.gain.exponentialRampToValueAtTime(0.001, at + dur);
    o.connect(g); g.connect(master);
    o.start(at); o.stop(at + dur + 0.03);
  } catch (e) {}
}
function tone(f, dur, type = 'square', vol = 0.2, slide = 0, delay = 0) {
  if (!actx) return;
  toneAt(f, dur, type, vol, actx.currentTime + delay, slide);
}
function noiseAt(dur, vol, freq, at) {
  if (!actx || !S.sound) return;
  try {
    const len = Math.max(1, Math.floor(actx.sampleRate * dur));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = actx.createBufferSource(); src.buffer = buf;
    const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
    const g = actx.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(master);
    src.start(at);
  } catch (e) {}
}
function noise(dur = 0.2, vol = 0.3, freq = 800, delay = 0) {
  if (!actx) return;
  noiseAt(dur, vol, freq, actx.currentTime + delay);
}
const sfx = {
  whoosh() { noise(0.12, 0.22, 1500); },
  pick()   { tone(760, 0.07, 'square', 0.14); tone(1140, 0.09, 'square', 0.12, 0, 0.06); },
  slice()  { tone(620, 0.08, 'triangle', 0.22); tone(930, 0.1, 'triangle', 0.2, 0, 0.07); tone(1245, 0.12, 'triangle', 0.18, 0, 0.14); },
  crash()  { noise(0.35, 0.5, 420); tone(110, 0.32, 'sawtooth', 0.32, -60); },
  bump()   { noise(0.12, 0.3, 320); tone(90, 0.16, 'sine', 0.3, -30); },
  turn()   { tone(523, 0.1, 'square', 0.2); tone(784, 0.13, 'square', 0.2, 0, 0.09); },
  miss()   { tone(330, 0.2, 'sawtooth', 0.2, -90); tone(220, 0.28, 'sawtooth', 0.2, -70, 0.16); },
  siren()  { for (let i = 0; i < 3; i++) { tone(660, 0.2, 'square', 0.14, 0, i * 0.42); tone(880, 0.2, 'square', 0.14, 0, i * 0.42 + 0.21); } },
  bell()   { tone(880, 0.4, 'sine', 0.32); tone(700, 0.55, 'sine', 0.3, 0, 0.28); },
  full()   { [523, 659, 784, 1046].forEach((f, i) => tone(f, 0.15, 'triangle', 0.22, 0, i * 0.08)); },
  cash()   { [784, 988, 1175, 1568].forEach((f, i) => tone(f, 0.12, 'square', 0.13, 0, i * 0.07)); },
  dead()   { [392, 330, 262, 196].forEach((f, i) => tone(f, 0.32, 'triangle', 0.24, 0, i * 0.24)); },
  tick()   { tone(980, 0.05, 'square', 0.1); },
  row()    { tone(660, 0.06, 'square', 0.12); },
  near(n)  { tone(520 + Math.min(n, 8) * 75, 0.07, 'square', 0.13); tone(780 + Math.min(n, 8) * 75, 0.08, 'square', 0.11, 0, 0.05); },
};
// tarantella-ish loop in A minor, 6/8 feel
const NOTE = m => 440 * Math.pow(2, (m - 69) / 12);
const MEL  = [69, 71, 72, 71, 69, 64, 69, 71, 72, 74, 72, 71, 72, 71, 69, 67, 69, 71, 69, 0, 76, 0, 74, 72];
const BASS = [45, 0, 0, 52, 0, 0, 45, 0, 0, 52, 0, 0, 43, 0, 0, 50, 0, 0, 45, 0, 0, 52, 0, 0];
function startMusic() {
  if (musicTimer || !actx) return;
  musicT = actx.currentTime + 0.1;
  musicStep = 0;
  musicTimer = setInterval(() => {
    if (!actx || !S.sound || state === 'pause') return;
    if (musicT < actx.currentTime - 0.05) musicT = actx.currentTime + 0.05;
    const step = state === 'play' && run ? Math.max(0.088, 0.108 - run.lvl * 0.0015) : 0.125;
    while (musicT < actx.currentTime + 0.16) {
      const i = musicStep % 24;
      if (MEL[i])  toneAt(NOTE(MEL[i]), step * 1.7, 'square', 0.038, musicT);
      if (BASS[i]) toneAt(NOTE(BASS[i]), step * 2.6, 'triangle', 0.085, musicT);
      if (i % 3 === 0) noiseAt(0.03, 0.028, 6500, musicT);
      musicT += step;
      musicStep++;
    }
  }, 60);
}
function say(txt) {
  if (!S.sound || typeof speechSynthesis === 'undefined') return;
  const n = performance.now();
  if (n - lastSay < 2600) return;
  lastSay = n;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt.replace(/[^a-zA-Z' !?.,\-]/g, ''));
    u.lang = 'it-IT'; u.rate = 1.12; u.pitch = 1.15; u.volume = 1;
    speechSynthesis.speak(u);
  } catch (e) {}
}

// ---------- Tony ----------
const PHRASES = {
  start:    ["Andiamo! The pizza she's getting cold!", "Presto presto! They are hungry!", "Go go go, ragazzo!", "Drive fast, but no scratch the scooter!"],
  crash:    ["MAMMA MIA!", "My scooter!!", "That's coming out of your paycheck!", "Ma che fai?!", "Madonna santa!"],
  near:     ["Ooh! Bellissimo!", "Madonna, so close!", "You drive like your nonna... I LIKE IT!", "Che coraggio!"],
  turnHit:  ["Perfetto!", "Ecco! That's the way!", "Bravo ragazzo!", "Magnifico turn!"],
  turnMiss: ["NO NO NO, the OTHER left!", "Recalculating?! MAMMA MIA...", "Where you going, eh?!", "The GPS, she cries!"],
  full:     ["FREE PIZZA! You earned it!", "Magnifico! A whole pie!", "Mamma mia, che pizza!"],
  trap:     ["The polizia! Slow down!", "A ticket?! MAMMA MIA!", "Not the polizia again!"],
  boost:    ["FASTER! FASTER!", "VAI VAI VAI!", "The pizza, she's still hot!"],
  deliver:  ["Bellissimo! Still hot!", "That's a nice tip!", "Tony is so proud of you!", "Perfetto! Another happy customer!"],
  dead:     ["My pizza... she's gone...", "Nooo! The marinara... everywhere...", "Tony's heart, she breaks..."],
};
let bubble = null; // {txt,t,dur,mood}
function tony(kind, speak) {
  const txt = pick(PHRASES[kind] || PHRASES.start);
  bubble = { txt, t: 0, dur: 2.7, mood: kind };
  if (speak !== false) say(txt);
}

// ---------- input ----------
let ptr = { down: false, x0: 0, y0: 0, swiped: false, t0: 0 };
let boostTouch = false, boostKey = false;
const isBoost = () => (boostTouch || boostKey) && state === 'play';
let buttons = [];
function pointerDown(x, y) {
  initAudio();
  if (actx && actx.state === 'suspended') { try { actx.resume(); } catch (e) {} }
  ptr = { down: true, x0: x, y0: y, swiped: false, t0: performance.now() };
  if (state === 'play') boostTouch = true;
}
function pointerMove(x, y) {
  if (!ptr.down) return;
  const dx = x - ptr.x0, dy = y - ptr.y0;
  if (Math.abs(dx) > 32 && Math.abs(dx) > Math.abs(dy) * 1.15) {
    onSwipe(dx > 0 ? 1 : -1);
    ptr.x0 = x; ptr.y0 = y; ptr.swiped = true;
  }
}
function pointerUp(x, y) {
  boostTouch = false;
  if (ptr.down && !ptr.swiped && performance.now() - ptr.t0 < 400) onTap(x, y);
  ptr.down = false;
}
let touchId = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (touchId !== null) return; // one-thumb game: ignore extra fingers
  const t = e.changedTouches[0];
  touchId = t.identifier;
  pointerDown(t.clientX / scale, t.clientY / scale);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) pointerMove(t.clientX / scale, t.clientY / scale);
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchId = null;
      pointerUp(t.clientX / scale, t.clientY / scale);
    }
  }
}, { passive: false });
canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { touchId = null; boostTouch = false; ptr.down = false; }
  }
}, { passive: false });
canvas.addEventListener('mousedown', e => pointerDown(e.clientX / scale, e.clientY / scale));
canvas.addEventListener('mousemove', e => pointerMove(e.clientX / scale, e.clientY / scale));
canvas.addEventListener('mouseup',   e => pointerUp(e.clientX / scale, e.clientY / scale));
canvas.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
window.addEventListener('keydown', e => {
  initAudio();
  if (e.repeat) { if ([' ', 'ArrowUp', 'w', 'W'].includes(e.key)) e.preventDefault(); return; }
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') onSwipe(-1);
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') onSwipe(1);
  else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') {
    e.preventDefault();
    if (state === 'play') boostKey = true;
    else primaryAction();
  }
  else if (e.key === 'Enter') primaryAction();
  else if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
    if (state === 'play') setState('pause');
    else if (state === 'pause') setState('play');
  }
  else if (e.key === 'm' || e.key === 'M') { S.sound = !S.sound; save(); }
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') boostKey = false;
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'play') setState('pause');
});
function onTap(x, y) {
  for (const b of buttons) {
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { sfx.tick(); b.fn(); return; }
  }
}
function primaryAction() {
  const b = buttons.find(b => b.primary);
  if (b) { sfx.tick(); b.fn(); }
}

// ---------- game state ----------
let state = 'title', stateT = 0;
let run = null, player = null;
let entities = [], parts = [], pops = [];
let shake = 0, flashW = 0, flashR = 0, worldRot = 0;
let tTitle = 0, tGlobal = 0, shopShake = null;
function setState(s) { state = s; stateT = 0; }

const NAMES = ['Mrs. Rossi', 'Luigi', 'Sofia', 'Don Vito', 'Nonna Lucia', 'Marco', 'Giulia', 'Dr. Bianchi', 'Chef Enzo', 'Sig. Ferrari', 'Bella', 'Paolo'];
const STREETS = ['Via Roma', 'Via Napoli', 'Corso Italia', 'Via Garibaldi', 'Vicolo del Forno', 'Piazza San Marco', 'Via Vesuvio', 'Lungomare'];
const PIZZAS = ['Margherita', 'Pepperoni', 'Quattro Formaggi', 'Diavola', 'Capricciosa', 'Calzone', 'Funghi', 'Napoletana'];
const SIDES = ['Breadsticks', 'Garlic Knots', 'Tiramisu', 'Cannoli'];
const CARCOLS = ['#5B8FB9', '#C97BA7', '#7FB069', '#E0A458', '#8D86C9', '#B56357', '#6D9DC5', '#A26769'];

function makeOrder(lvl) {
  const items = [];
  items.push(ri(1, 2) + '× ' + pick(PIZZAS));
  if (Math.random() < 0.7) items.push('1× ' + pick(PIZZAS));
  if (Math.random() < 0.6) items.push('1× ' + pick(SIDES));
  return { name: pick(NAMES), street: pick(STREETS), num: ri(2, 99), items };
}

function startRun(lvl) {
  const distM = 520 + lvl * 230;
  const nTurns = Math.min(1 + Math.floor((lvl - 1) / 2), 4);
  const turns = [];
  for (let i = 0; i < nTurns; i++) {
    const f = 0.22 + 0.6 * (i + rnd(0.3, 0.7)) / nTurns;
    turns.push({ m: Math.round(distM * clamp(f, 0.15, 0.85)), dir: Math.random() < 0.5 ? -1 : 1, state: 'pending', warned: false });
  }
  turns.sort((a, b) => a.m - b.m);
  for (let i = 1; i < turns.length; i++) if (turns[i].m - turns[i - 1].m < 110) turns[i].m = turns[i - 1].m + 110;
  const baseSpeed = 296 + lvl * 15;
  run = {
    lvl, distM, elapsed: 0, traveled: 0, speed: 0, baseSpeed,
    score: 0, slicesTotal: 0, pizzas: 0, sticks: 0, bestCombo: 0,
    turns, ti: 0, nextSpawn: 700, detours: 0, recalcT: 0,
    par: (distM * M2PX) / (baseSpeed * 1.22), heatBonus: 0,
    order: pendingOrder || makeOrder(lvl), arriving: false, over: false, boostChat: 0, result: null, revived: false,
  };
  if (pendingTurns.length === turns.length) turns.forEach((tn, i) => { tn.dir = pendingTurns[i].dir; });
  pendingOrder = null;
  player = { lane: 1, x: laneX(1), tlane: 1, boxes: 3, inv: 0, tilt: 0, slices: 0, combo: 0, comboT: 0, speedMul: 1, stumble: 0 };
  entities = []; parts = []; pops = [];
  shake = 0; flashW = 0; flashR = 0; worldRot = 0;
  boostTouch = false; boostKey = false;
  setState('play');
  tony('start');
}

// ---------- entities & spawning ----------
const DIMS = { car: { w: 54, h: 90 }, cop: { w: 54, h: 90 }, barrier: { w: 90, h: 26 }, pothole: { w: 52, h: 32 } };
function ent(type, lane, y, extra) {
  const e = Object.assign({ type, lane, y, x: laneX(lane), passed: false, hit: false }, extra || {});
  entities.push(e);
  return e;
}
const diff = () => run ? clamp((run.lvl - 1) / 11, 0, 1) : 0;
function spawnPattern(y) {
  const d = diff();
  const r = Math.random();
  // first delivery opens fail-proof: treats only for the first stretch
  if (run.lvl === 1 && S.delivered === 0 && y < 2300) {
    if (r < 0.5) {
      const dir = Math.random() < 0.5 ? 1 : -1;
      for (let i = 0; i < 6; i++) {
        const l = clamp(dir > 0 ? Math.floor(i / 2) : 2 - Math.floor(i / 2), 0, 2);
        ent('slice', l, y + i * 56);
      }
      return 340;
    }
    const l0 = ri(0, 2);
    for (let i = 0; i < 5; i++) ent('stick', l0, y + i * 50);
    return 300;
  }
  if (r < 0.13) { // slice arc weaving across lanes
    const dir = Math.random() < 0.5 ? 1 : -1;
    for (let i = 0; i < 6; i++) {
      const l = clamp(dir > 0 ? Math.floor(i / 2) : 2 - Math.floor(i / 2), 0, 2);
      ent('slice', l, y + i * 56);
    }
    return 340;
  }
  if (r < 0.25) { // breadstick line
    const l = ri(0, 2);
    for (let i = 0; i < 5; i++) ent('stick', l, y + i * 50);
    return 300;
  }
  if (r < 0.42) { // single car (sometimes with a treat behind)
    const l = ri(0, 2);
    ent('car', l, y, { col: pick(CARCOLS) });
    if (Math.random() < 0.4) ent('stick', (l + ri(1, 2)) % 3, y + 60);
    return 0;
  }
  if (r < 0.54) { // roadwork barrier
    ent('barrier', ri(0, 2), y);
    return 0;
  }
  if (r < 0.54 + 0.14 * d + 0.04) { // wall with one gap, treats in the gap
    const gap = ri(0, 2);
    for (let l = 0; l < 3; l++) {
      if (l === gap) continue;
      Math.random() < 0.5 ? ent('car', l, y, { col: pick(CARCOLS) }) : ent('barrier', l, y);
    }
    for (let i = 0; i < 3; i++) ent('stick', gap, y - 20 + i * 46);
    return 140;
  }
  if (r < 0.72 + 0.06 * d) { // slalom
    let l = ri(0, 2);
    for (let i = 0; i < 3; i++) {
      ent(Math.random() < 0.7 ? 'car' : 'barrier', l, y + i * 240, { col: pick(CARCOLS) });
      const nl = clamp(l + (l === 0 ? 1 : l === 2 ? -1 : (Math.random() < 0.5 ? 1 : -1)), 0, 2);
      if (i < 2) ent('slice', nl, y + i * 240 + 120);
      l = nl;
    }
    return 500;
  }
  if (r < 0.80 + 0.04 * d) { // parked cop
    ent('cop', ri(0, 2), y, { col: '#F2F4F8' });
    return 0;
  }
  if (r < 0.86 && d > 0.08) { // speed trap zone
    ent('trap', 1, y, { busted: 0 });
    return 60;
  }
  if (r < 0.94) { // pothole cluster
    ent('pothole', ri(0, 2), y);
    if (Math.random() < 0.5) ent('pothole', ri(0, 2), y + 90);
    return 40;
  }
  if (d > 0.25) { // drifting car with blinker
    const from = ri(0, 2);
    const to = clamp(from + (from === 0 ? 1 : from === 2 ? -1 : (Math.random() < 0.5 ? 1 : -1)), 0, 2);
    ent('car', from, y, { col: pick(CARCOLS), vy: run.baseSpeed * 0.3, driftTo: to, driftP: 0, drifting: false });

// ---------- core actions ----------
function onSwipe(dir) {
  if (state !== 'play') return;
  const tn = run.turns[run.ti];
  if (tn && tn.state === 'pending') {
    const dpx = tn.m * M2PX - run.traveled;
    if (dpx > -80 && dpx < 340 && dir === tn.dir) { doTurn(tn); return; }
  }
  const nt = clamp(player.tlane + dir, 0, 2);
  if (nt !== player.tlane) { player.tlane = nt; sfx.whoosh(); }
}
function doTurn(tn) {
  tn.state = 'done';
  sfx.turn();
  worldRot = tn.dir * 0.45;
  flashW = 0.3;
  run.score += 100;
  run.heatBonus += 1.5;
  pop(cx, H * 0.34, 'PERFECT TURN! +100', GOLD, 1.25);
  burst(player.x, playerY, 16, GOLD);
  entities = entities.filter(e => e.y < run.traveled + 60);
  run.nextSpawn = Math.max(run.nextSpawn, run.traveled + 760);
  if (Math.random() < 0.6) tony('turnHit');
}
function crash(force) {
  if (player.inv > 0 && !force) return;
  player.boxes--;
  player.inv = 1.8;
  player.combo = 0;
  player.speedMul = 0.3;
  shake = 16; flashR = 0.55;
  sfx.crash();
  try { if (typeof navigator !== 'undefined' && navigator.vibrate) navigator.vibrate(60); } catch (e) {}
  burst(player.x, playerY, 22, RED);
  burst(player.x, playerY - 10, 12, GOLD);
  if (player.boxes <= 0) { gameOver(); return; }

}
function gameOver() {
  S.bs += run.sticks;
  save();
  sfx.dead();
  tony('dead');
  setState('dead');
}
function finishRun() {
  run.over = true;
  const heatPct = clamp((run.par * 1.4 - (run.elapsed - run.heatBonus)) / (run.par * 0.9), 0, 1);
  const base = 6 + run.lvl * 2;
  const heat = Math.round(12 * heatPct * (1 + run.lvl * 0.12));
  const pies = run.pizzas * 5;
  const combo = Math.min(12, run.bestCombo);
  const fines = run.detours * 2;
  const tip = Math.max(Math.round(base * 0.5), base + heat + pies + combo - fines);
  const total = run.score + tip * 10;
  const stars = 1 + (heatPct > 0.42 ? 1 : 0) + ((heatPct > 0.78 && player.boxes === 3) || run.pizzas > 0 ? 1 : 0);
  const heatLabel = heatPct > 0.75 ? 'PIPING HOT!' : heatPct > 0.4 ? 'Nice & warm' : 'Lukewarm...';
  const rows = [['Delivery fee', base], ['Hot pizza bonus', heat]];
  if (pies) rows.push(['Whole pies made', pies]);
  if (combo) rows.push(['Best combo', combo]);
  if (fines) rows.push(['Missed turns', -fines]);
  const prevBest = S.best['l' + run.lvl] || 0;
  const newBest = total > prevBest;
  if (newBest) S.best['l' + run.lvl] = total;
  S.bs += run.sticks;
  S.delivered++;
  if (run.lvl === S.lvl) S.lvl++;
  save();
  run.result = { rows, tip, total, stars, heatLabel, newBest, shown: 0, counted: false };
  sfx.bell();
  confetti();
  tony('deliver');
  setState('delivered');
}

// ---------- update ----------
function updatePlay(dt) {
  run.elapsed += dt;
  player.inv = Math.max(0, player.inv - dt);
  player.stumble = Math.max(0, player.stumble - dt);
  player.speedMul += (1 - player.speedMul) * Math.min(1, dt * 1.6);
  player.comboT -= dt;
  if (player.comboT <= 0) player.combo = 0;
  run.recalcT = Math.max(0, run.recalcT - dt);

  // speed & travel
  let mul = player.speedMul * (isBoost() ? 1.72 : 1);
  const remM = run.distM - run.traveled / M2PX;
  if (run.arriving) mul *= clamp(remM / 30, 0.12, 1);
  const target = run.baseSpeed * mul;
  run.speed = lerp(run.speed, target, 1 - Math.pow(0.002, dt));
  run.traveled += run.speed * dt;

  // boost chatter
  if (isBoost()) {
    run.boostChat += dt;
    if (run.boostChat > 5) { run.boostChat = 0; if (Math.random() < 0.4) tony('boost'); }
  }

  // lane movement
  const tx = laneX(player.tlane);
  player.x += (tx - player.x) * Math.min(1, dt * 13);
  player.tilt = clamp((tx - player.x) / LANEW, -1, 1);

  // turns
  const tn = run.turns[run.ti];
  if (tn) {
    const dpx = tn.m * M2PX - run.traveled;
    if (tn.state === 'pending' && !tn.warned && dpx < 360) { tn.warned = true; sfx.tick(); }
    if (tn.state === 'pending' && dpx < -80) {
      tn.state = 'missed';
      const add = Math.max(90, remM * 0.13);
      run.distM += add;
      run.detours++;
      run.recalcT = 2.2;
      flashR = 0.45;
      player.combo = 0;
      sfx.miss();
      tony('turnMiss');
      pop(cx, H * 0.34, 'MISSED TURN! +' + Math.round(add) + 'm', '#FF8A80', 1.1);
    }
    if ((tn.state === 'done' || tn.state === 'missed') && dpx < -280) run.ti++;
  }

  // arrival
  if (!run.arriving && remM <= 32) {
    run.arriving = true;
    entities = entities.filter(e => e.y < run.traveled || e.type === 'slice' || e.type === 'stick');
  }
  if (remM <= 0 && !run.over) { finishRun(); return; }

  // spawning
  while (run.nextSpawn < run.traveled + H + 420) {
    const y = run.nextSpawn;
    const remAtY = run.distM - y / M2PX;
    if (remAtY < 55) { run.nextSpawn += 240; continue; }
    if (run.turns.some(t => t.state === 'pending' && Math.abs(t.m * M2PX - y) < 320)) { run.nextSpawn += 180; continue; }
    const extra = spawnPattern(y);
    run.nextSpawn += lerp(345, 220, diff()) + rnd(0, 70) + extra;
  }

  // entities
  const pw = 40, ph = 58;
  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    if (e.vy) e.y += e.vy * dt;
    if (e.driftTo !== undefined) {
      if (!e.drifting && e.y - run.traveled < 860) e.drifting = true;
      if (e.drifting && e.driftP < 1) {
        e.driftP = Math.min(1, e.driftP + dt / 1.4);
        e.x = lerp(laneX(e.lane), laneX(e.driftTo), e.driftP * e.driftP * (3 - 2 * e.driftP));
      }
    }
    const sy = playerY - (e.y - run.traveled);
    if (sy > H + 160) { entities.splice(i, 1); continue; }
    if (sy < -240) continue;

    if (e.type === 'slice' || e.type === 'stick') {
      if (Math.abs(sy - playerY) < 52 && Math.abs(e.x - player.x) < 62) {
        entities.splice(i, 1);
        if (e.type === 'slice') {
          player.slices++; run.slicesTotal++; run.score += 25;
          sfx.slice();
          burst(player.x, playerY - 30, 8, GOLD, { g: 150 });
          if (player.slices >= 8) {
            player.slices = 0; run.pizzas++; run.score += 200;
            sfx.full(); flashW = 0.3; tony('full');
            if (player.boxes < 3) { player.boxes++; pop(cx, H * 0.3, 'WHOLE PIE! +1 PIZZA BOX', GOLD, 1.2); }
            else pop(cx, H * 0.3, 'WHOLE PIE! +200', GOLD, 1.2);
          }
        } else {
          run.sticks++; run.score += 10;
          sfx.pick();
          burst(player.x, playerY - 30, 4, '#D9A05B', { g: 150 });
        }
      }
      continue;
    }
    if (e.type === 'trap') {
      if (!e.passed && sy > playerY) {
        e.passed = true;
        if (isBoost()) {
          e.busted = 1;
          S.bs = Math.max(0, S.bs - 15);
          run.score = Math.max(0, run.score - 50);
          run.sticks = Math.max(0, run.sticks - 5);
          sfx.siren(); flashR = 0.4; shake = 8;
          tony('trap');
          pop(cx, H * 0.34, 'SPEEDING FINE! -5 STICKS', '#FF8A80', 1.1);
        } else {
          pop(e.x, sy - 40, 'radar ok', '#9FD8FF', 0.75);
        }
      }
      continue;
    }
    // solid obstacles
    if (!e.passed && sy > playerY + 55) {
      e.passed = true;
      if (!e.hit && player.inv <= 0 && Math.abs(e.x - player.x) > 58 && Math.abs(e.x - player.x) < 155) {
        player.combo++; player.comboT = 3.5;
        run.bestCombo = Math.max(run.bestCombo, player.combo);
        const pts = 5 * player.combo;
        run.score += pts;
        pop(player.x, playerY - 74, 'NEAR MISS ×' + player.combo, '#7AE0FF', 0.9);
        sfx.near(player.combo);
        if (player.combo >= 3 && Math.random() < 0.3) tony('near');
      }
    }
    if (!e.hit && player.inv <= 0) {
      const d = DIMS[e.type];
      if (d && Math.abs(sy - playerY) < (d.h + ph) / 2 * 0.7 && Math.abs(e.x - player.x) < (d.w + pw) / 2 * 0.72) {
        e.hit = true;
        if (e.type === 'pothole') {
          if (player.stumble <= 0) {
            player.stumble = 0.5; player.speedMul = 0.5;
            shake = 6; sfx.bump();
            if (player.slices > 0) { player.slices--; pop(player.x, playerY - 60, 'dropped a slice!', '#FF8A80', 0.85); }
          }
        } else crash();
      }
    }
  }

  updateFx(dt);
}
function updateFx(dt) {
  shake = Math.max(0, shake - dt * 34);
  flashW = Math.max(0, flashW - dt * 1.6);
  flashR = Math.max(0, flashR - dt * 1.4);
  worldRot *= Math.exp(-dt * 3.4);
  if (bubble) { bubble.t += dt; if (bubble.t > bubble.dur) bubble = null; }
  for (let i = pops.length - 1; i >= 0; i--) {
    const p = pops[i];
    p.t += dt; p.y += p.vy * dt; p.vy *= 0.94;
    if (p.t > p.dur) pops.splice(i, 1);
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.t += dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.g * dt; p.rot += p.vr * dt;
    if (p.t > p.life) parts.splice(i, 1);
  }
}

function drawRoad(traveled, lvl) {
  const walkCols = ['#E4BE8C', '#E8C9A0', '#D9C2A6', '#E6BDA0'];
  const walk = walkCols[(lvl - 1) % 4];

    ctx.fillStyle = shade(walk, -0.28);
    ctx.fillRect(0, 0, cx - bEdge, H);
    ctx.fillRect(cx + bEdge, 0, W - (cx + bEdge), H);
    ctx.fillStyle = 'rgba(34,26,32,0.14)';

    ctx.fillRect(cx + bEdge - 5, 0, 5, H);

  // sidewalk decorations (deterministic per world row)
  const row0 = Math.floor((traveled - 260) / 200);

    for (let side = 0; side < 2; side++) {
      const h = hash(k * 2 + side + 7);
      const sy = playerY - (k * 200 - traveled);
      if (sy < -160 || sy > H + 160) continue;
      const sx = side === 0 ? cx - edge - 45 : cx + edge + 45;
      ctx.save();
      ctx.translate(sx, sy);
      if (h < 0.3) { // striped awning jutting from the buildings
        const green = h < 0.15;
        ctx.lineWidth = 2.5; ctx.strokeStyle = 'rgba(34,26,32,0.55)';
        for (let i = 0; i < 4; i++) {

        }
        ctx.strokeRect(-34, -26, 68, 52);
        ctx.fillStyle = 'rgba(34,26,32,0.12)';
        ctx.fillRect(-34, 44, 68, 10);
      } else if (h < 0.5) { // cafe table
        ctx.fillStyle = 'rgba(34,26,32,0.15)';
        ctx.beginPath(); ctx.ellipse(2, 6, 18, 10, 0, 0, TAU); ctx.fill();
        ctx.lineWidth = 2.5; ctx.strokeStyle = INK;
        ctx.fillStyle = '#FDFBF4';
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, TAU); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#B56357';
        ctx.beginPath(); ctx.arc(-22, 8, 6, 0, TAU); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(22, -8, 6, 0, TAU); ctx.fill(); ctx.stroke();
      } else if (h < 0.72) { // potted plant
        ctx.lineWidth = 2.5; ctx.strokeStyle = INK;
        ctx.fillStyle = '#B5643C';
        rr(ctx, -11, 4, 22, 16, 4); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#3E8E5A';
        ctx.beginPath();
        ctx.arc(-8, -4, 9, 0, TAU); ctx.arc(8, -4, 9, 0, TAU); ctx.arc(0, -12, 10, 0, TAU);
        ctx.fill(); ctx.stroke();
      } else if (h < 0.86) { // hydrant
        ctx.lineWidth = 2.5; ctx.strokeStyle = INK;
        ctx.fillStyle = RED;
        rr(ctx, -7, -10, 14, 22, 5); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -12, 6, 0, TAU); ctx.fill(); ctx.stroke();
      } // else: empty stretch

  // curbs + road
  ctx.fillStyle = shade(walk, -0.35);
  ctx.fillRect(cx - edge - 10, 0, 10, H);
  ctx.fillRect(cx + edge, 0, 10, H);
  ctx.fillStyle = ASPHALT;
  ctx.fillRect(cx - edge, 0, ROADW, H);
  // subtle asphalt patches
  for (let k = row0; k < row0 + Math.ceil(H / 200) + 3; k++) {
    const h = hash(k * 3 + 31);

      const sy = playerY - (k * 200 + h * 140 - traveled);

function drawEntities(t) {

function drawPlayScene(t) {

  }

  for (const tn of run.turns) drawIntersection(tn, run.traveled, t);
  if (run.arriving || run.over) drawHouse(run.traveled);
  drawEntities(t);
  // player
  ctx.save();
  ctx.translate(player.x, playerY + (player.stumble > 0 ? Math.sin(t * 40) * 3 : 0));
  drawScooter(ctx, curSkin(), { tilt: player.tilt, boost: isBoost() && !run.over, blink: player.inv > 0, t });
  ctx.restore();
  // boost speed lines
  if (isBoost() && !run.over) {
    ctx.strokeStyle = 'rgba(255,246,227,0.28)';
    ctx.lineWidth = 3; ctx.lineCap = 'round';
    for (let i = 0; i < 7; i++) {
      const lx = cx + (hash(i * 17 + Math.floor(t * 14)) - 0.5) * (ROADW + 140);
      const ly = ((t * 900 + i * 173) % (H + 200)) - 100;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, ly + rnd(60, 130)); ctx.stroke();
    }
  }
  // particles
  for (const p of parts) {
    ctx.save();
    ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.col;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.7);
    ctx.restore();
  }
  ctx.restore();
  // time-of-day tint
  const tod = (run.lvl - 1) % 3;
  if (tod === 1) { ctx.fillStyle = 'rgba(255,116,60,0.09)'; ctx.fillRect(0, 0, W, H); }
  if (tod === 2) {
    ctx.fillStyle = 'rgba(24,32,84,0.22)'; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#FFF6C9';
    ctx.beginPath();
    ctx.moveTo(player.x - 14, playerY - 34);
    ctx.lineTo(player.x - 44, playerY - 240);
    ctx.lineTo(player.x + 44, playerY - 240);
    ctx.lineTo(player.x + 14, playerY - 34);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // popups
  for (const p of pops) {
    const k = clamp(p.t / 0.14, 0, 1);
    ctx.save();
    ctx.globalAlpha = clamp((p.dur - p.t) / 0.3, 0, 1);
    ctx.translate(p.x, p.y);
    ctx.scale(0.5 + k * 0.5, 0.5 + k * 0.5);
    txt(p.txt, 0, 0, p.size, p.col, 'center', 900, true);
    ctx.restore();
  }
  if (flashW > 0) { ctx.fillStyle = 'rgba(255,255,255,' + (flashW * 0.55) + ')'; ctx.fillRect(0, 0, W, H); }
  if (flashR > 0) { ctx.fillStyle = 'rgba(230,57,70,' + (flashR * 0.3) + ')'; ctx.fillRect(0, 0, W, H); }
}

// ---------- main loop ----------
let last = 0;
function frame(ts) {
  requestAnimationFrame(frame);
  const t = ts / 1000;
  let dt = t - last;
  last = t;
  if (dt <= 0 || dt > 0.25) dt = 0.016;
  dt = Math.min(dt, 0.033);
  tGlobal += dt;
  stateT += dt;
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  buttons = [];
  if (state === 'play') {
    updatePlay(dt);
    // finishRun may switch state mid-update
    if (state === 'play') {
      drawPlayScene(tGlobal);
      drawHud(tGlobal);
    } else if (state === 'delivered') drawDelivered(0);
    else if (state === 'dead') drawDead(0);
  }
  else if (state === 'title') { updateFx(dt); drawTitle(dt); }
  else if (state === 'order') { updateFx(dt); if (!pendingOrder) prepOrder(); drawOrder(dt); }
  else if (state === 'delivered') drawDelivered(dt);
  else if (state === 'dead') drawDead(dt);
  else if (state === 'shop') { updateFx(dt); drawShop(dt); }
  else if (state === 'pause') drawPause();
}
requestAnimationFrame(frame);

// order screen regenerates each visit
const _setState = setState;
setState = function (s) {
  if (s === 'order') prepOrder();
  _setState(s);
};

// ---------- test hooks ----------
window.__T = {
  get state() { return state; },
  setState: s => setState(s),
  startRun,
  onSwipe,
  swipe: onSwipe,
  press: () => { boostTouch = true; },
  release: () => { boostTouch = false; },
  tap: onTap,
  crash: () => crash(true),
  finish: () => { if (run) run.traveled = run.distM * M2PX + 1; },
  get run() { return run; },
  get player() { return player; },
  get entities() { return entities; },
  get S() { return S; },
  resize,
};
</script>
